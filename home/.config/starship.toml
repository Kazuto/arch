# Starship Configuration
# Based on modules/home/cli/zsh/default.nix

# Disable newline before prompt
add_newline = false

# Simple format: os, directory, git, newline, prompt
format = """$os$directory$git_branch$git_status$line_break$character"""

# Right prompt: status, duration, jobs, versions
right_format = """$status$cmd_duration$jobs$python$nodejs$php$ruby$golang$rust"""

# OS icon
[os]
disabled = false
format = "[$symbol ]($style)"
style = "bold red"

[os.symbols]
Windows = "оңҸ"
Ubuntu = "у°•Ҳ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Arch = "у°ЈҮ"
NixOS = "уұ„…"

# Directory
[directory]
format = "[$path]($style) "
style = "bold peach"
truncation_length = 3
truncate_to_repo = true

# Git branch
[git_branch]
format = "on [$symbol$branch]($style) "
style = "bold mauve"
symbol = "оңҘ "

# Git status
[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold yellow"
modified = "!${count}"
untracked = "?${count}"
deleted = "вңҳ${count}"
renamed = "В»${count}"
staged = "+${count}"
stashed = "\\$${count}"

# Status
[status]
disabled = false
format = "[$symbol$status ]($style)"
style = "bold red"
symbol = "вңҳ "

# Command duration
[cmd_duration]
min_time = 2000
format = "[$duration ]($style)"
style = "bold yellow"

# Background jobs
[jobs]
format = "[$symbol$number ]($style)"
symbol = "вңҰ "
style = "bold blue"

# Character (prompt symbol)
[character]
success_symbol = "[вқҜ](bold green)"
error_symbol = "[вқҜ](bold red)"

# Language versions
[python]
format = "[${symbol}${version} ]($style)"
style = "yellow"
symbol = "оҳҶ "

[nodejs]
format = "[${symbol}${version} ]($style)"
style = "green"
symbol = "оҙҚ "

[php]
format = "[${symbol}${version} ]($style)"
style = "blue"
symbol = "оҳҲ "

[ruby]
format = "[${symbol}${version} ]($style)"
style = "red"
symbol = "оһ‘ "

[golang]
format = "[${symbol}${version} ]($style)"
style = "sapphire"
symbol = "оҳ§ "

[rust]
format = "[${symbol}${version} ]($style)"
style = "peach"
symbol = "оһЁ "

[docker_context]
format = "[${symbol}${version} ]($style)"
style = "blue"
symbol = "пҢҲ "

# Catppuccin Mocha palette
palette = "catppuccin_mocha"

