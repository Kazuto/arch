debug {
  disable_logs = false
}

# === Environment === #
env = GTK_THEME,catppuccin-mocha-pink-standard+default
env = QT_STYLE_OVERRIDE,Adwaita-Dark
env = ELECTRON_ENABLE_FEATURES,WebContentsForceDarkMode

# === Monitors === #
monitor=DP-3,2560x1440@180,0x0,1,transform,1
monitor=DP-1,3440x1440@120,1440x0,1
monitor=DP-2,2560x1440@180,4880x0,1,transform,3

# === Status Bar, OSD, Wallpaper === #
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'catppuccin-mocha-pink-standard+default'
exec-once = quickshell
exec-once = wl-clipboard-history -t

exec-once = avizo-service
exec-once = awww-daemon
exec-once = sleep 2 && ~/.config/swww/set-wallpaper.sh "$(find $HOME/Wallpaper/ -type f | shuf -n 1)"

exec-once = ~/.config/hypr/xdg-portal-hyprland

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland HYPRLAND_INSTANCE_SIGNATURE DBUS_SESSION_BUS_ADDRESS
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE

exec-once = $POLKIT_AUTH_AGENT
# exec-once = $HOME/.local/share/hyprload/hyprload.sh

# Restore saved session (if exists)
# exec-once = sleep 3 && ~/.local/bin/hyprland-restore-session

# Static app launches disabled - session restore script handles this
# Uncomment these if you want static launches instead of dynamic session restoration
exec-once = [workspace 1 silent] firefox
exec-once = [workspace 2 silent] ghostty
exec-once = [workspace 3 silent] tableplus
exec-once = [workspace 4 silent] bruno
exec-once = [workspace 11 silent] vesktop
exec-once = [workspace 21 silent] spotify
# exec-once = [workspace 11 silent] teams-for-linux

# === Keyboard === #
input {
  follow_mouse = 1
  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
  numlock_by_default = true

  kb_layout = eu
}

# === Layout === #
general {
  layout = master

  gaps_in=5
  gaps_out=15
  border_size=2

  col.active_border = rgb(fab387) rgb(1e1e2e) rgb(1e1e2e) rgb(fab387) 45deg
  col.inactive_border = rgba(1e1e2eff)
}

# === Misc === #
misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  enable_swallow = true
  swallow_regex = ^(kitty)$
}

# === Decorations === #
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
        vibrancy = 0.1696
        ignore_opacity = true
    }

    shadow {
        enabled = false
        color = rgba(1a1a1aee)
    }
}

layerrule = match:namespace gtk-layer-shell, blur on
layerrule = match:namespace lockscreen, blur on

# === Animations === #
animations {
  enabled = true

  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = smoothOut, 0.36, 0, 0.66, -0.56
  bezier = smoothIn, 0.25, 1, 0.5, 1

  animation = windows, 1, 5, overshot, slide
  animation = windowsOut, 1, 4, smoothOut, slide
  animation = windowsMove, 1, 4, default
  animation = border, 1, 10, default
  animation = fade, 1, 10, smoothIn
  animation = workspaces, 1, 6, default

}

# === Layouts === #
dwindle {
  pseudotile = true
  preserve_split = true
}

# === Window rules === #
source = ~/.config/hypr/windowrules.conf

# === Keybinds === #
bind = SUPER ALT, B, exec, firefox
bind = SUPER ALT, T, exec, teams
bind = SUPER ALT, Q, exec, ghostty
bind = SUPER ALT, E, exec, thunar
bind = SUPER ALT, Y, exec, ghostty -e yazi

bind = SUPER SHIFT, C, exec, hyprpicker -a -n

bind = SUPER, R, exec, hyprctl reload && pkill quickshell && quickshell & # Reload Hyprland + Quickshell
bind = SUPER, period, exec, killall rofimoji || rofimoji
bind = SUPER, W, exec, ~/.config/swww/set-wallpaper.sh "$(find $HOME/Wallpaper/ -type f | shuf -n 1)"
bind = SUPER, escape, exec, killall wleave || wleave

bind = SUPER, X, killactive,
bind = SUPER SHIFT, X, exit,
bind = SUPER, F, fullscreen,
bind = SUPER, Space, exec, killall rofi || rofi -show drun -theme ~/.config/rofi/themes/drun.rasi

# === Screenshots === #
$screenshotDir = $(xdg-user-dir PICTURES)/Screenshots

# Screenshots with grimblast - Save to file
# bind = SUPER SHIFT, 2, exec, mkdir -p $screenshotDir && grimblast --notify save screen "$screenshotDir/$(date +'screenshot_%Y%m%d_%H%M%S.png')"
# bind = SUPER SHIFT, 3, exec, mkdir -p $screenshotDir && grimblast --notify save output "$screenshotDir/$(date +'screenshot_%Y%m%d_%H%M%S.png')"
# bind = SUPER SHIFT, 4, exec, mkdir -p $screenshotDir && grimblast --notify save area "$screenshotDir/$(date +'screenshot_%Y%m%d_%H%M%S.png')"
# bind = SUPER SHIFT, 5, exec, mkdir -p $screenshotDir && grimblast --notify --freeze save area "$screenshotDir/$(date +'screenshot_%Y%m%d_%H%M%S.png')"

# Screenshots with grimblast - Copy to clipboard
bind = SUPER SHIFT, 2, exec, grimblast --notify copy screen
bind = SUPER SHIFT, 3, exec, grimblast --notify copy output
bind = SUPER SHIFT, 4, exec, grimblast --notify copy area
bind = SUPER SHIFT, 5, exec, grimblast --notify --freeze copy area

# === Other === #

# === Focus === #
# Hyper key (CapsLock) + hjkl = focus (matches Aerospace alt-shift-cmd-ctrl-hjkl)
bind = SUPER, h, movefocus, l
bind = SUPER, j, movefocus, d
bind = SUPER, k, movefocus, u
bind = SUPER, l, movefocus, r

# === Move Windows === #
# SUPER+ALT+hjkl = move window (matches aerospace alt-shift-hjkl)
bind = SUPER ALT, h, movewindow, l
bind = SUPER ALT, j, movewindow, d
bind = SUPER ALT, k, movewindow, u
bind = SUPER ALT, l, movewindow, r

# === Resize Windows === #
# Alt+minus/equal = resize (matches Aerospace alt-minus/equal)
bind = ALT, minus, resizeactive, -50 0
bind = ALT, equal, resizeactive, 50 0
bind = SUPER SHIFT, h, resizeactive, -20 0
bind = SUPER SHIFT, j, resizeactive, 0 -20
bind = SUPER SHIFT, k, resizeactive, 0 20
bind = SUPER SHIFT, l, resizeactive, 20 0

# === Window Groups === #
bind= SUPER, g, togglegroup
bind= SUPER, tab, changegroupactive

# Hyper key (CapsLock) + numbers = switch workspace (matches Aerospace)
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Hyper key + left/right = workspace prev/next (matches Aerospace)
bind = CTRL SHIFT ALT, left, workspace, e-1
bind = CTRL SHIFT ALT, right, workspace, e+1

# Hyper key + f = fullscreen (matches Aerospace alt-shift-cmd-ctrl-f)
bind = CTRL SHIFT ALT, f, fullscreen

# Alt+Tab = workspace back-and-forth (matches Aerospace)
bind = ALT, tab, workspace, previous

# === Move to Workspace === #
# Alt+Shift+numbers = move window to workspace (matches Aerospace)
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10

# === Mouse Binds === #
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# === Audio === #
binde=, XF86AudioRaiseVolume, exec, volumectl -u up
binde=, XF86AudioLowerVolume, exec, exec  volumectl -u down
bindl=, XF86AudioMute, exec, volumectl toggle-mute
bind=, XF86AudioPlay, exec, playerctl play-pause
bind=, XF86AudioPause, exec, playerctl play-pause
bind=, XF86AudioNext, exec, playerctl next
bind=, XF86AudioPrev, exec, playerctl previous

# === Workspace Binds === #
# DP-1 (Primary/Center): Workspaces 1-10
workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1

# DP-2 (Right): Workspaces 11-20
workspace = 11, monitor:DP-2
workspace = 12, monitor:DP-2
workspace = 13, monitor:DP-2
workspace = 14, monitor:DP-2
workspace = 15, monitor:DP-2
workspace = 16, monitor:DP-2
workspace = 17, monitor:DP-2
workspace = 18, monitor:DP-2
workspace = 19, monitor:DP-2
workspace = 20, monitor:DP-2

# HDMI-A-1 (Third): Workspaces 21-30
workspace = 21, monitor:DP-3
workspace = 22, monitor:DP-3
workspace = 23, monitor:DP-3
workspace = 24, monitor:DP-3
workspace = 25, monitor:DP-3
workspace = 26, monitor:DP-3
workspace = 27, monitor:DP-3
workspace = 28, monitor:DP-3
workspace = 29, monitor:DP-3
workspace = 30, monitor:DP-3

# === Plugins === #
# Load Hyprland plugins (split-monitor-workspaces)
exec-once = hyprpm reload -n

# Environment variables
source = ~/.config/hypr/env.conf
