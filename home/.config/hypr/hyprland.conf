debug {
  disable_logs = false
}

# === Environment === #
env = GTK_THEME,Adwaita-dark
env = QT_STYLE_OVERRIDE,Adwaita-Dark
env = ELECTRON_ENABLE_FEATURES,WebContentsForceDarkMode

# === Monitors === #
monitor=DP-1,3440x1440@100.00Hz,0x0,1
monitor=DP-2,1920x1080@165,3440x0,1

# === Status Bar, OSD, Wallpaper === #
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec-once = waybar
exec-once = wl-clipboard-history -t

exec-once = avizo-service
exec-once = hyprpaper
exec-once = swww-daemon
exec-once = sleep 0.5 && swww img "$(find ~/Wallpaper/ -type f \( -name "*.jpg" -o -name "*.png" -o -name "*.jpeg" \) | shuf -n 1)" --outputs DP-1 --resize crop
exec-once = sleep 0.5 && swww img "$(find ~/Wallpaper/ -type f \( -name "*.jpg" -o -name "*.png" -o -name "*.jpeg" \) | shuf -n 1)" --outputs DP-2 --resize crop

exec-once = ~/.config/hypr/xdg-portal-hyprland

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland DBUS_SESSION_BUS_ADDRESS
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = $POLKIT_AUTH_AGENT
# exec-once = $HOME/.local/share/hyprload/hyprload.sh

exec-once = spotify_player --daemon

exec-once = [workspace 1 silent] firefox -P "Work" --class "firefox-work"
exec-once = [workspace 2 silent] ghostty
exec-once = [workspace 3 silent] tableplus
exec-once = [workspace 4 silent] bruno
exec-once = [workspace 5 silent] firefox -P "Personal" --class "firefox-personal"
exec-once = [workspace 6 silent] thunderbird
exec-once = [workspace 10 silent] spotify
exec-once = [workspace 11 silent] teams-for-linux

# === Keyboard === #
input {
  follow_mouse = 1
  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
  numlock_by_default = true

  # Default keyboard layout (EurKEY for easy umlauts)
  # Caps Lock remapped via keyd to Hyper (Ctrl+Shift+Alt)
  kb_layout = eu
  # kb_variant = intl
  # kb_options = compose:ralt  # Right Alt as compose key
  # CapsLock remapping handled by keyd
}

# === Layout === #
general {
  layout = master

  gaps_in=5
  gaps_out=15
  border_size=2

  col.active_border = rgb(fab387) rgb(1e1e2e) rgb(1e1e2e) rgb(fab387) 45deg
  col.inactive_border = rgba(1e1e2eff)
}

# === Misc === #
misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  enable_swallow = true
  swallow_regex = ^(kitty)$
}

# === Decorations === #
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
        vibrancy = 0.1696
        ignore_opacity = true
    }

    shadow {
        enabled = false
        color = rgba(1a1a1aee)
    }
}

layerrule = match:namespace gtk-layer-shell, blur on
# layerrule = match:namespace waybar, blur on
layerrule = match:namespace lockscreen, blur on

# === Animations === #
animations {
  enabled = true

  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = smoothOut, 0.36, 0, 0.66, -0.56
  bezier = smoothIn, 0.25, 1, 0.5, 1

  animation = windows, 1, 5, overshot, slide
  animation = windowsOut, 1, 4, smoothOut, slide
  animation = windowsMove, 1, 4, default
  animation = border, 1, 10, default
  animation = fade, 1, 10, smoothIn
  animation = workspaces, 1, 6, default

}

# === Layouts === #
dwindle {
  pseudotile = true
  preserve_split = true
}

# === Window rules === #
windowrule = match:class ghostty, opacity 1.0 0.5
windowrule = match:class file_progress, float on
windowrule = match:class confirm, float on
windowrule = match:class dialog, float on
windowrule = match:class download, float on
windowrule = match:class notification, float on
windowrule = match:class error, float on
windowrule = match:class splash, float on
windowrule = match:class confirmreset, float on
windowrule = match:title Open File, float on
windowrule = match:title branchdialog, float on
windowrule = match:class Lxappearance, float on
windowrule = match:class Rofi, float on, no_anim on, dim_around on
windowrule = match:class viewnior, float on
windowrule = match:class feh, float on
windowrule = match:class pavucontrol-qt, float on
windowrule = match:class pavucontrol, float on
windowrule = match:class file-roller, float on
windowrule = match:class wlogout, fullscreen on
windowrule = match:title wlogout, float on, fullscreen on
windowrule = match:class mpv, idle_inhibit focus
windowrule = match:class firefox, idle_inhibit fullscreen
windowrule = match:class firefox-work, idle_inhibit fullscreen
windowrule = match:class firefox-work, workspace 1
windowrule = match:class firefox-personal, idle_inhibit fullscreen
windowrule = match:class firefox-personal, workspace 5
windowrule = match:title ^(Media viewer)$, float on
windowrule = match:title ^(Volume Control)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Volume Control)$, size 800 600, move 75 44%
windowrule = match:float border_size 0
windowrule = match:class thunderbird, workspace 6
windowrule = match:class discord, workspace 8
windowrule = match:class steam, workspace 9
windowrule = match:class steam, float on
windowrule = match:class Prominence™ II: Hasturian Era, fullscreen_state 2 2, content game
windowrule = match:class Prominence™ II: Hasturian Era, immediate on
windowrule = match:class Prominence™ II: Hasturian Era, suppress_event fullscreen

# === Keybinds === #
bind = SUPER, F1, exec, ~/.config/hypr/keybind
bind = SUPER, B, exec, firefox -P "Personal" --class "firefox-personal"
bind = SUPER, S, exec, firefox -P "Work" --class "firefox-work"
bind = SUPER, T, exec, teams
bind = SUPER, Q, exec, ghostty
bind = SUPER, E, exec, thunar

# === Audio === #
binde=, XF86AudioRaiseVolume, exec, volumectl -u up
binde=, XF86AudioLowerVolume, exec, exec  volumectl -u down
bindl=, XF86AudioMute, exec, volumectl toggle-mute

# binde=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
# binde=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# binde=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=, XF86AudioPlay, exec, playerctl play-pause
bind=, XF86AudioPause, exec, playerctl play-pause
bind=, XF86AudioNext, exec, playerctl next
bind=, XF86AudioPrev, exec, playerctl previous

# === Screenshots === #
# Organized by capture size (largest to smallest):
# Super+Shift+2: All displays to file
# Super+Shift+3: Current display to file
# Super+Shift+4: Region selection to file
# Super+Ctrl+Shift+2/3/4: Same as above but to clipboard

$screenshotDir = $(xdg-user-dir PICTURES)/Screenshots

# Screenshots with grimblast - Save to file
bind = SUPER SHIFT, 2, exec, mkdir -p $screenshotDir && grimblast --notify save screen "$screenshotDir/$(date +'screenshot_%Y%m%d_%H%M%S.png')"
bind = SUPER SHIFT, 3, exec, mkdir -p $screenshotDir && grimblast --notify save output "$screenshotDir/$(date +'screenshot_%Y%m%d_%H%M%S.png')"
bind = SUPER SHIFT, 4, exec, mkdir -p $screenshotDir && grimblast --notify save area "$screenshotDir/$(date +'screenshot_%Y%m%d_%H%M%S.png')"
bind = SUPER SHIFT, 5, exec, mkdir -p $screenshotDir && grimblast --notify --freeze save area "$screenshotDir/$(date +'screenshot_%Y%m%d_%H%M%S.png')"

# Screenshots with grimblast - Copy to clipboard
bind = SUPER CTRL SHIFT, 2, exec, grimblast --notify copy screen
bind = SUPER CTRL SHIFT, 3, exec, grimblast --notify copy output
bind = SUPER CTRL SHIFT, 4, exec, grimblast --notify copy area
bind = SUPER CTRL SHIFT, 5, exec, grimblast --notify --freeze copy area

# === Other === #
bind = SUPER SHIFT, C, exec, hyprpicker -a -n
bind = CTRL ALT, L, exec, swaylock

bind = SUPER, R, exec, hyprctl reload && pkill waybar && waybar & # Reload Hyprland + Waybar
bind = SUPER, Tab, exec, killall rofi || rofi -show window -modi window -theme ~/.config/rofi/themes/windows.rasi
bind = SUPER, period, exec, rofimoji
bind = SUPER, W, exec, ~/.config/swww/set-wallpaper.sh "$(find $HOME/Wallpaper/ -type f \( -name "*.jpg" -o -name "*.png" -o -name "*.jpeg" \) | shuf -n 1)"
bind = SUPER, escape, exec, killall wleave || wleave

bind = SUPER, X, killactive,
bind = SUPER SHIFT, X, exit,
bind = SUPER, F, fullscreen,
bind = SUPER, Space, exec, killall rofi || rofi -show drun -theme ~/.config/rofi/themes/drun.rasi
bind = SUPER SHIFT, P, pseudo, # dwindle
bind = SUPER, S, togglesplit, # dwindle

# === Focus === #
# Hyper key (CapsLock) + hjkl = focus (matches Aerospace alt-shift-cmd-ctrl-hjkl)
bind = CTRL SHIFT ALT, h, movefocus, l
bind = CTRL SHIFT ALT, j, movefocus, d
bind = CTRL SHIFT ALT, k, movefocus, u
bind = CTRL SHIFT ALT, l, movefocus, r
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# === Move Windows === #
# Alt+Shift+hjkl = move window (matches Aerospace alt-shift-hjkl)
bind = ALT SHIFT, h, movewindow, l
bind = ALT SHIFT, j, movewindow, d
bind = ALT SHIFT, k, movewindow, u
bind = ALT SHIFT, l, movewindow, r
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# === Resize Windows === #
# Alt+minus/equal = resize (matches Aerospace alt-minus/equal)
bind = ALT, minus, resizeactive, -50 0
bind = ALT, equal, resizeactive, 50 0
bind = SUPER CTRL, left, resizeactive, -20 0
bind = SUPER CTRL, right, resizeactive, 20 0
bind = SUPER CTRL, up, resizeactive, 0 -20
bind = SUPER CTRL, down, resizeactive, 0 20

# === Window Groups === #
bind= SUPER, g, togglegroup
bind= SUPER, tab, changegroupactive

# === Workspaces === #
bind = SUPER, grave, togglespecialworkspace
bind = SUPER SHIFT, grave, movetoworkspace, special

# === Workspace Binds === #
workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 10, monitor:DP-2

# Hyper key (CapsLock) + numbers = switch workspace (matches Aerospace)
bind = CTRL SHIFT ALT, 1, workspace, 1
bind = CTRL SHIFT ALT, 2, workspace, 2
bind = CTRL SHIFT ALT, 3, workspace, 3
bind = CTRL SHIFT ALT, 4, workspace, 4
bind = CTRL SHIFT ALT, 5, workspace, 5
bind = CTRL SHIFT ALT, 6, workspace, 6
bind = CTRL SHIFT ALT, 7, workspace, 7
bind = CTRL SHIFT ALT, 8, workspace, 8
bind = CTRL SHIFT ALT, 9, workspace, 9
bind = CTRL SHIFT ALT, 0, workspace, 10

# Hyper key + left/right = workspace prev/next (matches Aerospace)
bind = CTRL SHIFT ALT, left, workspace, e-1
bind = CTRL SHIFT ALT, right, workspace, e+1

# Hyper key + f = fullscreen (matches Aerospace alt-shift-cmd-ctrl-f)
bind = CTRL SHIFT ALT, f, fullscreen

# Alt+Tab = workspace back-and-forth (matches Aerospace)
bind = ALT, tab, workspace, previous

# === Move to Workspace === #
# Alt+Shift+numbers = move window to workspace (matches Aerospace)
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10

# === Mouse Binds === #
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# === Plugins === #
# Load Hyprland plugins (split-monitor-workspaces)
exec-once = hyprpm reload -n

# Environment variables
source = ~/.config/hypr/env.conf
