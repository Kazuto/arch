[session]
# Enable session save/restore
save_on_exit = true
restore_on_start = true

# Save session data location
session_dir = ~/.local/state/uwsm/sessions

# Autosave interval (in seconds, 0 = disabled, save only on exit)
autosave_interval = 300

[hyprland]
# Hyprland-specific settings
compositor = hyprland
restore_workspaces = true
restore_window_positions = true
